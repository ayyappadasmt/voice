services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app/data:/app/app/data # persist knowledge base
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        # Browser talks to the backend WebSocket on the host.
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/voice}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
